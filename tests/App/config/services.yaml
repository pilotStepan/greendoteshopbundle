services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Register controllers needed for functional tests.
    # autoconfigure: true is required for AbstractController to receive its container (ServiceSubscriberInterface).
    # controller.service_arguments tag allows the framework to inject route parameters as action arguments.

    Greendot\EshopBundle\Controller\Shop\ClientSectionController:
        tags: ['controller.service_arguments']

    Greendot\EshopBundle\Controller\Simple\SimpleProductVariantController:
        tags: ['controller.service_arguments']

    # Synthetic services allow functional tests to inject mocks via $container->set()
    Greendot\EshopBundle\Repository\Project\ProductVariantRepository:
        synthetic: true

    Symfony\Component\Messenger\MessageBusInterface:
        synthetic: true
