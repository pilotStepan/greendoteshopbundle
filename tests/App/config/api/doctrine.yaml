doctrine:
    dbal:
        url: 'sqlite:///%env(resolve:API_TEST_DB_PATH)%'
        types:
            array: Greendot\EshopBundle\Tests\App\Doctrine\LegacyArrayType
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        mappings:
            GreendotEshopBundle:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'Greendot\EshopBundle\Entity'
                alias: GreendotEshopBundle
        filters:
            transportation_isEnabled:
                class: Greendot\EshopBundle\Doctrine\TransportationIsEnabledFilter
                enabled: true
